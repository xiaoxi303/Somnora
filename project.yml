name: Somnora
targets:
  Somnora:
    bundleId: com.xiaoxi303.Somnora
    type: application
    platform: iOS
    deploymentTarget: "16.5"
    sources:
      - path: Somnora
    settings:
      MARKETING_VERSION: 1.0.0
      CURRENT_PROJECT_VERSION: 1
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
      TARGETED_DEVICE_FAMILY: 1
    info:
      path: Somnora/Info.plist
      properties:
        NSHealthShareUsageDescription: "Somnora 需要读取您的睡眠数据，用于生成睡眠分析、趋势和健康建议。"
        NSHealthUpdateUsageDescription: "Somnora 将同步您的睡眠记录到健康 App。"
    entitlements:
      path: Somnora/Somnora.entitlements
