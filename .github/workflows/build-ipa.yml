name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Archive for Generic iOS Device
        run: |
          xcodebuild archive \
            -project Somnora.xcodeproj \
            -scheme Somnora \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Somnora.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Extract .app from the archive
          APP_PATH="build/Somnora.xcarchive/Products/Applications/Somnora.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Error: .app folder not found in archive!"
            exit 1
          fi
          
          echo "🔍 Auditing .app contents:"
          ls -lhR "$APP_PATH"
          
          # Check if the main executable exists
          EXECUTABLE="$APP_PATH/Somnora"
          if [ ! -f "$EXECUTABLE" ]; then
            echo "❌ CRITICAL ERROR: Main executable 'Somnora' is missing!"
            # Try to find any executable in the folder just in case
            ls -F "$APP_PATH"
            exit 1
          fi
          
          echo "📦 Packaging App from Archive: $APP_PATH"
          ditto "$APP_PATH" "Payload/Somnora.app"
          
          echo "🤐 Zipping IPA..."
          zip -r Somnora_Unsigned.ipa Payload
          
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Somnora-Unsigned-IPA
          path: Somnora_Unsigned.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: "Somnora 最新预览版"
          body: "这是自动构建的最新无签名 iOS 安装包。请下载后使用全能签、巨魔或 Sideloadly 安装。"
          files: Somnora_Unsigned.ipa
          make_latest: true
