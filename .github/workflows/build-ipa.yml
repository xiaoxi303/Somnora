name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Clean build output
        run: rm -rf build Payload Somnora_Unsigned.ipa bundle-audit.txt

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Archive for Generic iOS Device
        run: |
          set -euo pipefail

          xcodebuild archive \
            -project Somnora.xcodeproj \
            -scheme Somnora \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Somnora.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          set -euo pipefail

          rm -rf Payload Somnora_Unsigned.ipa bundle-audit.txt
          APP_PATH="build/Somnora.xcarchive/Products/Applications/Somnora.app"
          IPA_PATH="Somnora_Unsigned.ipa"
          MIN_IPA_BYTES=$((300 * 1024))

          {
            echo "Somnora bundle audit"
            echo "Generated at: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "App path: $APP_PATH"
            echo
          } | tee bundle-audit.txt

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app folder not found in archive: $APP_PATH" | tee -a bundle-audit.txt
            exit 1
          fi

          {
            echo "Top-level .app contents:"
            ls -lah "$APP_PATH"
            echo
            echo "Recursive .app file list:"
            find "$APP_PATH" -print | sort
            echo
            echo ".app disk usage:"
            du -sh "$APP_PATH"
            echo
          } | tee -a bundle-audit.txt

          for required in "$APP_PATH/Somnora" "$APP_PATH/Info.plist" "$APP_PATH/Assets.car"; do
            if [ ! -e "$required" ]; then
              echo "ERROR: Required bundle file is missing: $required" | tee -a bundle-audit.txt
              exit 1
            fi
          done

          if [ ! -s "$APP_PATH/Somnora" ]; then
            echo "ERROR: Main executable exists but is empty: $APP_PATH/Somnora" | tee -a bundle-audit.txt
            exit 1
          fi

          mkdir -p Payload
          ditto "$APP_PATH" "Payload/Somnora.app"

          ditto -c -k --sequesterRsrc --keepParent Payload "$IPA_PATH"

          IPA_SIZE=$(stat -f%z "$IPA_PATH")
          APP_SIZE=$(du -sk "$APP_PATH" | awk '{print $1 * 1024}')

          {
            echo "Packaged IPA:"
            ls -lah "$IPA_PATH"
            echo "App size bytes: $APP_SIZE"
            echo "IPA size bytes: $IPA_SIZE"
            echo
            echo "IPA zip listing:"
            unzip -l "$IPA_PATH"
          } | tee -a bundle-audit.txt

          if [ "$IPA_SIZE" -lt "$MIN_IPA_BYTES" ]; then
            echo "ERROR: IPA is unexpectedly small: ${IPA_SIZE} bytes; expected at least ${MIN_IPA_BYTES} bytes." | tee -a bundle-audit.txt
            exit 1
          fi

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Somnora-Unsigned-IPA
          path: |
            Somnora_Unsigned.ipa
            bundle-audit.txt
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: "Somnora 最新预览版"
          body: "这是自动构建的最新无签名 iOS 安装包。请下载后使用全能签、巨魔或 Sideloadly 安装。"
          files: Somnora_Unsigned.ipa
          make_latest: true
