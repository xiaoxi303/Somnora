name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for Generic iOS Device
        run: |
          xcodebuild build \
            -project Somnora.xcodeproj \
            -scheme Somnora \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Standard location when using -derivedDataPath
          APP_PATH="build/Build/Products/Release-iphoneos/Somnora.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: .app folder not found at $APP_PATH"
            exit 1
          fi
          
          echo "Packaging App from: $APP_PATH"
          # Use ditto to preserve permissions and attributes
          ditto "$APP_PATH" "Payload/Somnora.app"
          zip -ry Somnora_Unsigned.ipa Payload
          
      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Somnora-Unsigned-IPA
          path: Somnora_Unsigned.ipa
