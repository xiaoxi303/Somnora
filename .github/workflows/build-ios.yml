name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Generate iOS Icons
        run: npx @capacitor/assets generate --ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build Unsigned App
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package into IPA
        run: |
          mkdir -p Payload
          # xcodebuild outputs to build/Build/Products/Release-iphoneos/App.app
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r Somnara.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Somnara-iOS-Unsigned
          path: Somnara.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: "Somnara 最新测试版"
          body: "自动构建的最新无签名 iOS 安装包 (Somnara.ipa)\n\n请使用 AltStore, Sideloadly 或 巨魔(TrollStore) 进行安装。"
          files: Somnara.ipa
          prerelease: true
